version: "3.9"

# This file is for LOCAL development only.
# Railway deployment uses the Dockerfile directly via railway.toml.
# Add a MySQL service in your Railway project dashboard and Railway will
# automatically inject MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      MYSQLHOST: mysql
      MYSQLPORT: 3306
      MYSQLUSER: ${MYSQLUSER:-naaliatan}
      MYSQLPASSWORD: ${MYSQLPASSWORD:-secret}
      MYSQLDATABASE: ${MYSQLDATABASE:-naaliatan_db}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:8080}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-changeme}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MAILER_DSN: ${MAILER_DSN:-null://null}
    depends_on:
      - mysql
    networks:
      - naaliatan_network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ${MYSQLDATABASE:-naaliatan_db}
      MYSQL_USER: ${MYSQLUSER:-naaliatan}
      MYSQL_PASSWORD: ${MYSQLPASSWORD:-secret}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - naaliatan_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8083:80"
    depends_on:
      - mysql
    networks:
      - naaliatan_network

volumes:
  mysql_data:

networks:
  naaliatan_network:
    driver: bridge
